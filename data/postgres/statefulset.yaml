apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: data
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - -c
            - max_connections=300
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: postgres-superuser-password
            - name: BACKEND_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: backend-postgres-password
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: identity-postgres-password
            - name: WALLET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: wallet-postgres-password
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - pg_isready -U postgres -d postgres
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 30Gi
