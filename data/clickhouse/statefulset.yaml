apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: data
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.8-alpine
          env:
            - name: CLICKHOUSE_DB
              value: cazinoshiz
            - name: CLICKHOUSE_USER
              value: default
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: clickhouse-password
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          readinessProbe:
            exec:
              command: ["sh", "-c", "clickhouse-client --password "$CLICKHOUSE_PASSWORD" --query 'SELECT 1'"]
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "3"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: backups
              mountPath: /backup
            - name: backup-config
              mountPath: /etc/clickhouse-server/config.d/backup_disk.xml
              subPath: backup_disk.xml
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: data-backups
        - name: backup-config
          configMap:
            name: clickhouse-backup-disk
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
