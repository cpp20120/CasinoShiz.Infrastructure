apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: data
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: metrics-exporter
    app.kubernetes.io/part-of: casinoshiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis-exporter
        app.kubernetes.io/component: metrics-exporter
        app.kubernetes.io/part-of: casinoshiz
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.72.0
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: REDIS_ADDR
              value: redis://redis.data.svc.cluster.local:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: redis-password
          ports:
            - name: metrics
              containerPort: 9121
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: data
  labels:
    app.kubernetes.io/name: redis-exporter
    app.kubernetes.io/component: metrics-exporter
    app.kubernetes.io/part-of: casinoshiz
spec:
  selector:
    app.kubernetes.io/name: redis-exporter
  ports:
    - name: metrics
      port: 9121
      targetPort: metrics
