apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: data
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: metrics-exporter
    app.kubernetes.io/part-of: casinoshiz
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/component: metrics-exporter
        app.kubernetes.io/part-of: casinoshiz
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: quay.io/prometheuscommunity/postgres-exporter:v0.17.1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: DATA_SOURCE_URI
              value: postgres.data.svc.cluster.local:5432/postgres?sslmode=disable
            - name: DATA_SOURCE_USER
              value: postgres
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: data-secrets
                  key: postgres-superuser-password
          ports:
            - name: metrics
              containerPort: 9187
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: data
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: metrics-exporter
    app.kubernetes.io/part-of: casinoshiz
spec:
  selector:
    app.kubernetes.io/name: postgres-exporter
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
