apiVersion: batch/v1
kind: CronJob
metadata:
  name: minio-backup
  namespace: data
spec:
  schedule: "15 4 * * *"
  timeZone: "Europe/Helsinki"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z
              env:
                - name: MINIO_ROOT_USER
                  valueFrom:
                    secretKeyRef:
                      name: data-secrets
                      key: minio-root-user
                - name: MINIO_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: data-secrets
                      key: minio-root-password
              command:
                - /bin/sh
                - -ec
                - |
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  target="/backup/minio/$ts"
                  mkdir -p "$target"

                  mc alias set source                     http://minio.data.svc.cluster.local:9000                     "$MINIO_ROOT_USER"                     "$MINIO_ROOT_PASSWORD"

                  mc mirror --overwrite source "$target"
                  find /backup/minio -mindepth 1 -maxdepth 1 -type d -mtime +6 -exec rm -rf {} +
              volumeMounts:
                - name: backups
                  mountPath: /backup
          volumes:
            - name: backups
              persistentVolumeClaim:
                claimName: data-backups
