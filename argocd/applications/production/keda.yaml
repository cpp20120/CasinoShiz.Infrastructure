apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: casinoshiz
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: '*'
    helm:
      releaseName: keda
      valuesObject:
        operator:
          replicaCount: 1
        metricsServer:
          replicaCount: 1
        webhooks:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
