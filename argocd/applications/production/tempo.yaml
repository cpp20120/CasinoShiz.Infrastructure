apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: casinoshiz
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: tempo
    targetRevision: '*'
    helm:
      releaseName: tempo
      valuesObject:
        replicas: 1
        tempo:
          reportingEnabled: false
          retention: 168h
          receivers:
            otlp:
              protocols:
                grpc:
                  endpoint: 0.0.0.0:4317
                http:
                  endpoint: 0.0.0.0:4318
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
              wal:
                path: /var/tempo/wal
        persistence:
          enabled: true
          storageClassName: local-path
          size: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
