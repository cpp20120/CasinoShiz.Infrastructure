apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-casinoshiz-bot2
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: casinoshiz
  source:
    repoURL: https://github.com/cpp20120/CasinoShiz.Infrastructure.git
    targetRevision: main
    path: charts/casinoshiz
    helm:
      releaseName: casinoshiz-bot2
      valueFiles:
        - values-local.yaml
        - values-bot2.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: casinoshiz-bot2
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
