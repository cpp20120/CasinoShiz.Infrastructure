apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-keycloak
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: casinoshiz
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: keycloak
    targetRevision: 25.2.0
    helm:
      releaseName: keycloak
      valuesObject:
        fullnameOverride: keycloak
        image:
          tag: 26.3.3-debian-12-r0
        auth:
          adminUser: admin
          existingSecret: keycloak-credentials
          passwordSecretKey: admin-password
        production: false
        httpEnabled: true
        replicaCount: 1
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
        postgresql:
          enabled: true
          auth:
            username: keycloak
            database: keycloak
            existingSecret: keycloak-credentials
            secretKeys:
              adminPasswordKey: postgres-password
              userPasswordKey: password
          primary:
            persistence:
              enabled: true
              storageClass: local-path
              size: 5Gi
        ingress:
          enabled: true
          ingressClassName: traefik
          hostname: keycloak.casinoshiz.localhost
          path: /
          pathType: Prefix
        networkPolicy:
          enabled: false
        extraDeploy:
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: keycloak-provision
              namespace: casinoshiz
              annotations:
                argocd.argoproj.io/hook: PostSync
                argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
            spec:
              backoffLimit: 6
              template:
                metadata:
                  labels:
                    app.kubernetes.io/name: keycloak-provision
                spec:
                  restartPolicy: OnFailure
                  containers:
                    - name: provision
                      image: quay.io/keycloak/keycloak:26.3.3
                      imagePullPolicy: IfNotPresent
                      command: [/bin/bash, -ec]
                      args:
                        - |
                          server=http://keycloak
                          realm=casinoshiz

                          until /opt/keycloak/bin/kcadm.sh config credentials \
                            --server "$server" \
                            --realm master \
                            --user admin \
                            --password "$KEYCLOAK_ADMIN_PASSWORD"; do
                            sleep 5
                          done

                          if ! /opt/keycloak/bin/kcadm.sh get "realms/$realm" >/dev/null 2>&1; then
                            /opt/keycloak/bin/kcadm.sh create realms \
                              -s realm="$realm" \
                              -s enabled=true \
                              -s displayName=CasinoShiz
                          fi

                          get_client_id() {
                            /opt/keycloak/bin/kcadm.sh get clients -r "$realm" \
                              -q "clientId=$1" \
                              --fields id --format csv --noquotes \
                              | sed -n '1p'
                          }

                          configure_client() {
                            client_id="$1"
                            client_secret="$2"
                            redirect_uri="$3"
                            id="$(get_client_id "$client_id" || true)"

                            if [ -z "$id" ]; then
                              /opt/keycloak/bin/kcadm.sh create clients -r "$realm" \
                                -s clientId="$client_id" \
                                -s enabled=true \
                                -s protocol=openid-connect \
                                -s publicClient=false \
                                -s standardFlowEnabled=true \
                                -s secret="$client_secret" \
                                -s "redirectUris=[\"$redirect_uri\"]" \
                                -s 'webOrigins=["+"]'
                              id="$(get_client_id "$client_id")"
                            else
                              /opt/keycloak/bin/kcadm.sh update "clients/$id" -r "$realm" \
                                -s secret="$client_secret" \
                                -s "redirectUris=[\"$redirect_uri\"]" \
                                -s 'webOrigins=["+"]'
                            fi

                            /opt/keycloak/bin/kcadm.sh create \
                              "clients/$id/protocol-mappers/models" -r "$realm" \
                              -s name=groups \
                              -s protocol=openid-connect \
                              -s protocolMapper=oidc-group-membership-mapper \
                              -s 'config."full.path"=false' \
                              -s 'config."id.token.claim"=true' \
                              -s 'config."access.token.claim"=true' \
                              -s 'config."userinfo.token.claim"=true' \
                              -s 'config."claim.name"=groups' \
                              >/dev/null 2>&1 || true
                          }

                          for group in platform-admins platform-readonly; do
                            if ! /opt/keycloak/bin/kcadm.sh get groups -r "$realm" \
                              -q "search=$group" --fields name --format csv --noquotes \
                              | grep -Fxq "$group"; then
                              /opt/keycloak/bin/kcadm.sh create groups -r "$realm" -s name="$group"
                            fi
                          done

                          configure_client grafana "$GRAFANA_CLIENT_SECRET" \
                            http://grafana.casinoshiz.localhost:8080/login/generic_oauth
                          configure_client argocd "$ARGOCD_CLIENT_SECRET" \
                            http://argocd.casinoshiz.localhost:8080/auth/callback

                          user_id="$(/opt/keycloak/bin/kcadm.sh get users -r "$realm" \
                            -q "username=$SSO_ADMIN_USER" --fields id --format csv --noquotes \
                            | sed -n '1p')"
                          if [ -z "$user_id" ]; then
                            /opt/keycloak/bin/kcadm.sh create users -r "$realm" \
                              -s username="$SSO_ADMIN_USER" -s enabled=true
                            user_id="$(/opt/keycloak/bin/kcadm.sh get users -r "$realm" \
                              -q "username=$SSO_ADMIN_USER" --fields id --format csv --noquotes \
                              | sed -n '1p')"
                          fi
                          /opt/keycloak/bin/kcadm.sh set-password -r "$realm" \
                            --username "$SSO_ADMIN_USER" \
                            --new-password:"$SSO_ADMIN_PASSWORD" \
                            --temporary=false

                          for group in platform-admins; do
                            group_id="$(/opt/keycloak/bin/kcadm.sh get groups -r "$realm" \
                              -q "search=$group" --fields id --format csv --noquotes \
                              | sed -n '1p')"
                            /opt/keycloak/bin/kcadm.sh update \
                              "users/$user_id/groups/$group_id" -r "$realm"
                          done
                      env:
                        - name: KEYCLOAK_ADMIN_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: keycloak-credentials
                              key: admin-password
                        - name: GRAFANA_CLIENT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: keycloak-credentials
                              key: grafana-client-secret
                        - name: ARGOCD_CLIENT_SECRET
                          valueFrom:
                            secretKeyRef:
                              name: keycloak-credentials
                              key: argocd-client-secret
                        - name: SSO_ADMIN_USER
                          valueFrom:
                            secretKeyRef:
                              name: keycloak-credentials
                              key: sso-admin-user
                        - name: SSO_ADMIN_PASSWORD
                          valueFrom:
                            secretKeyRef:
                              name: keycloak-credentials
                              key: sso-admin-password
  destination:
    server: https://kubernetes.default.svc
    namespace: casinoshiz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
