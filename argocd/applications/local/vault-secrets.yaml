apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: local-vault-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: casinoshiz
  source:
    repoURL: https://github.com/cpp20120/CasinoShiz.Infrastructure.git
    targetRevision: migrate/complete-argocd-local
    path: platform/secrets/vault
  destination:
    server: https://kubernetes.default.svc
    namespace: casinoshiz
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ServerSideApply=true
