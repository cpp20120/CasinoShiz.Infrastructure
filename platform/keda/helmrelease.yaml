apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keda
  namespace: keda
spec:
  interval: 30m
  chart:
    spec:
      chart: keda
      sourceRef:
        kind: HelmRepository
        name: kedacore
        namespace: flux-system
  values:
    operator:
      replicaCount: 1
    metricsServer:
      replicaCount: 1
    webhooks:
      replicaCount: 1
