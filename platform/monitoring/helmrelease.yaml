apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics
        namespace: flux-system
  values:
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "14d"
        storage:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
    vmcluster:
      enabled: false
    grafana:
      enabled: true
    alertmanager:
      enabled: true
