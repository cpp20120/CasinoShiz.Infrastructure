apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: casinoshiz-vault
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  provider:
    vault:
      server: http://vault.vault.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        tokenSecretRef:
          name: vault-root-token
          namespace: casinoshiz
          key: token
