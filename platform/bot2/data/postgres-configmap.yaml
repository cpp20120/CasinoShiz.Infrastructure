apiVersion: v1
kind: ConfigMap
metadata:
  name: casinoshiz-bot2-postgres-init
  namespace: casinoshiz-bot2
data:
  01-init-databases.sh: |
    #!/bin/sh
    set -eu

    psql \
      --username "$POSTGRES_USER" \
      --dbname "$POSTGRES_DB" \
      --set=backend_password="$BACKEND_DB_PASSWORD" \
      --set=identity_password="$IDENTITY_DB_PASSWORD" \
      --set=wallet_password="$WALLET_DB_PASSWORD" <<'SQL'
    SELECT format('CREATE ROLE backend LOGIN PASSWORD %L', :'backend_password')
    WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'backend')\gexec

    SELECT format('CREATE ROLE identity LOGIN PASSWORD %L', :'identity_password')
    WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'identity')\gexec

    SELECT format('CREATE ROLE wallet LOGIN PASSWORD %L', :'wallet_password')
    WHERE NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'wallet')\gexec

    SELECT 'CREATE DATABASE backend OWNER backend'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'backend')\gexec

    SELECT 'CREATE DATABASE identity OWNER identity'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'identity')\gexec

    SELECT 'CREATE DATABASE wallet OWNER wallet'
    WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'wallet')\gexec
    SQL
