apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: casinoshiz-bot2
  labels:
    app.kubernetes.io/name: casinoshiz-bot2-postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: casinoshiz-bot2-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: casinoshiz-bot2-postgres
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "max_connections=200"]
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: postgres
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casinoshiz-bot2-secrets-vault
                  key: postgres-superuser-password
            - name: BACKEND_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casinoshiz-bot2-secrets-vault
                  key: backend-postgres-password
            - name: IDENTITY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casinoshiz-bot2-secrets-vault
                  key: identity-postgres-password
            - name: WALLET_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casinoshiz-bot2-secrets-vault
                  key: wallet-postgres-password
          startupProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -U postgres -d postgres"]
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -U postgres -d postgres"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "pg_isready -U postgres -d postgres"]
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init
          configMap:
            name: casinoshiz-bot2-postgres-init
            defaultMode: 0755
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
