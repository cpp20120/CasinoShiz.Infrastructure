apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: casinoshiz-bot2-secrets
  namespace: casinoshiz-bot2
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: casinoshiz-vault
    kind: ClusterSecretStore
  target:
    name: casinoshiz-bot2-secrets-vault
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: casinoshiz/bot2
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  data:
    - secretKey: clickhouse-password
      remoteRef:
        key: casinoshiz/app
        property: clickhouse-password
