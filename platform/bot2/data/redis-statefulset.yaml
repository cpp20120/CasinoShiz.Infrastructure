apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: casinoshiz-bot2
  labels:
    app.kubernetes.io/name: casinoshiz-bot2-redis
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: casinoshiz-bot2-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: casinoshiz-bot2-redis
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - /bin/sh
            - -ec
            - >-
              exec redis-server --appendonly yes --appendfsync everysec
              --save 900 1 --save 300 10 --requirepass "$REDIS_PASSWORD"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: casinoshiz-bot2-secrets-vault
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
          startupProbe:
            exec:
              command: ["/bin/sh", "-ec", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            exec:
              command: ["/bin/sh", "-ec", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["/bin/sh", "-ec", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
