global:
  imageRegistry: k3d-casinoshiz-registry.localhost:5000
  imagePullPolicy: Always
  otelEndpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
  minioEndpoint: minio.data.svc.cluster.local:9000
  secretName: casinoshiz-secrets-vault

ingress:
  enabled: true
  className: traefik
  clusterIssuer: ""

monitoring:
  enabled: true

frontend:
  enabled: false
  host: app.casinoshiz.localhost
  image:
    repository: casinoshiz-frontend
    tag: local

backendImage:
  repository: casinoshiz-backend
  tag: local

services:
  identity:
    image: { repository: casinoshiz-identity, tag: local }
    autoscaling: false
  wallet:
    image: { repository: casinoshiz-wallet, tag: local }
    autoscaling: false
  telegram-bff:
    image: { repository: casinoshiz-telegram-bff, tag: local }
    host: tg.casinoshiz.localhost
    autoscaling: false
  telegram-bff-2:
    enabled: true
    autoscaling: false
    image: { repository: casinoshiz-telegram-bff, tag: local }
    channel: telegram
    tokenKey: telegram-bot-token-2
    tenantKey: bot2
    serviceName: telegram-bff-2
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: true
    port: 8080
    grpcPort: 8081
    public: true
    host: tg2.casinoshiz.localhost
  discord-bff:
    enabled: false
    image: { repository: casinoshiz-discord-bff, tag: local }
    autoscaling: false
  admin-bff:
    image: { repository: casinoshiz-admin-bff, tag: local }
    host: admin.casinoshiz.localhost
    autoscaling: false
  admin-bff-2:
    enabled: true
    autoscaling: false
    image: { repository: casinoshiz-admin-bff, tag: local }
    role: admin
    adminTokenKey: admin-web-token-2
    cookieName: casinoshiz.admin.bot2
    serviceName: admin-bff-2
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: false
    port: 8080
    grpcPort: 8081
    public: true
    host: admin2.casinoshiz.localhost
  rest-api:
    image: { repository: casinoshiz-rest-api, tag: local }
    host: api.casinoshiz.localhost
    autoscaling: false

autoscaling:
  enabled: false
