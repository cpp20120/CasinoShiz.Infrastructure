{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.serviceName }}
  labels:
    {{- include "casinoshiz.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $svc.serviceName }}
spec:
  replicas: {{ $.Values.common.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc.serviceName }}
        app.kubernetes.io/part-of: casinoshiz
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ $svc.serviceName }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          env:
            - name: Backend__ServiceName
              value: {{ $svc.serviceName | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ $svc.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.otelEndpoint | quote }}
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $svc.postgresSecretKey }}
            - name: Redis__Enabled
              value: {{ $svc.redisEnabled | quote }}
            {{- if $svc.redisEnabled }}
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: redis-connection-string
            {{- end }}
            
            {{- if eq $name "telegram-bff" }}
            - name: Bot__Token
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: telegram-bot-token
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
            - name: grpc
              containerPort: {{ $svc.grpcPort }}
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml $.Values.common.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.serviceName }}
  labels:
    app.kubernetes.io/name: {{ $svc.serviceName }}
    app.kubernetes.io/part-of: casinoshiz
spec:
  selector:
    app.kubernetes.io/name: {{ $svc.serviceName }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
    - name: grpc
      port: {{ $svc.grpcPort }}
      targetPort: grpc
{{- if and $.Values.ingress.enabled $svc.public }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svc.serviceName }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.clusterIssuer | quote }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  tls:
    - hosts:
        - {{ $svc.host | quote }}
      secretName: {{ $svc.serviceName }}-tls
  rules:
    - host: {{ $svc.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $svc.serviceName }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
