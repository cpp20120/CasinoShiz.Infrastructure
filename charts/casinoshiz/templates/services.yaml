{{- $gameRouteKeys := dict "dice" "Dice" "dicecube" "DiceCube" "darts" "Darts" "football" "Football" "basketball" "Basketball" "bowling" "Bowling" "transfer" "Transfer" "redeem" "Redeem" "leaderboard" "Leaderboard" "pixelbattle" "PixelBattle" "pick" "Pick" "blackjack" "Blackjack" "horse" "Horse" "challenges" "Challenges" "poker" "Poker" "secrethitler" "SecretHitler" "meta" "Meta" "admin" "Admin" }}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
{{- $isTelegramBff := or (eq $name "telegram-bff") (eq (default "" $svc.channel) "telegram") }}
{{- $isBff := or $isTelegramBff (eq $name "discord-bff") (eq (default "" $svc.channel) "discord") }}
{{- $isAdmin := or (eq $name "admin-bff") (eq (default "" $svc.role) "admin") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.serviceName }}
  labels:
    {{- include "casinoshiz.labels" $ | nindent 4 }}
    app.kubernetes.io/name: {{ $svc.serviceName }}
spec:
  replicas: {{ $.Values.common.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $svc.serviceName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $svc.serviceName }}
        app.kubernetes.io/part-of: casinoshiz
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: {{ $svc.serviceName }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          env:
            - name: Backend__ServiceName
              value: {{ $svc.serviceName | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ $svc.serviceName | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.otelEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
            - name: OTEL_METRIC_EXPORT_INTERVAL
              value: "10000"
            {{- if $isBff }}
            - name: Backend__GrpcAddress
              value: "http://game-admin:8081"
            {{- range $gameName, $game := $.Values.games }}
            {{- if $game.enabled }}
            - name: Backend__GameAddresses__{{ index $gameRouteKeys $gameName }}
              value: "http://game-{{ $gameName }}:8081"
            {{- end }}
            {{- end }}
            - name: Services__Identity__Address
              value: "http://identity:8081"
            - name: Services__Wallet__Address
              value: "http://wallet:8081"
            {{- end }}
            {{- if eq $name "rest-api" }}
            - name: Backend__GrpcAddress
              value: "http://game-admin:8081"
            {{- end }}
            {{- if $isAdmin }}
            - name: Services__Backend__Address
              value: "http://game-admin:8080"
            - name: Services__Backend__GrpcAddress
              value: "http://game-admin:8081"
            - name: Services__Identity__Address
              value: "http://identity:8081"
            - name: Services__Wallet__Address
              value: "http://wallet:8081"
            - name: Services__Operations__ApiKey
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: operations-api-key
            - name: Admin__WebToken
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ default "admin-web-token" $svc.adminTokenKey }}
            {{- if $svc.cookieName }}
            - name: Admin__CookieName
              value: {{ $svc.cookieName | quote }}
            {{- end }}
            {{- end }}
            - name: ConnectionStrings__Postgres
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ $svc.postgresSecretKey }}
            - name: Redis__Enabled
              value: {{ $svc.redisEnabled | quote }}
            {{- if $svc.redisEnabled }}
            - name: Redis__ConnectionString
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: redis-connection-string
            {{- end }}
            
            {{- if $isTelegramBff }}
            - name: Bot__Token
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.secretName }}
                  key: {{ default "telegram-bot-token" $svc.tokenKey }}
            {{- if $svc.tenantKey }}
            - name: Bot__TenantKey
              value: {{ $svc.tenantKey | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
            - name: grpc
              containerPort: {{ $svc.grpcPort }}
          startupProbe:
            httpGet:
              path: /health/live
              port: http
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: {{ if $isTelegramBff }}/health/live{{ else }}/health/ready{{ end }}
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml $.Values.common.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $svc.serviceName }}
  labels:
    app.kubernetes.io/name: {{ $svc.serviceName }}
    app.kubernetes.io/part-of: casinoshiz
spec:
  selector:
    app.kubernetes.io/name: {{ $svc.serviceName }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: http
    - name: grpc
      port: {{ $svc.grpcPort }}
      targetPort: grpc
{{- if and $.Values.ingress.enabled $svc.public }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $svc.serviceName }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $.Values.ingress.clusterIssuer | quote }}
spec:
  ingressClassName: {{ $.Values.ingress.className }}
  tls:
    - hosts:
        - {{ $svc.host | quote }}
      secretName: {{ $svc.serviceName }}-tls
  rules:
    - host: {{ $svc.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $svc.serviceName }}
                port:
                  name: http
{{- end }}
{{- end }}
{{- end }}
