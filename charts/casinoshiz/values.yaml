global:
  imageRegistry: ghcr.io/cpp20120
  imagePullPolicy: IfNotPresent
  otelEndpoint: http://opentelemetry-collector.observability.svc.cluster.local:4317
  minioEndpoint: minio.data.svc.cluster.local:9000
  secretName: casinoshiz-secrets

common:
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }

monitoring:
  enabled: true

ingress:
  enabled: true
  className: traefik
  clusterIssuer: letsencrypt-production

frontend:
  enabled: true
  replicas: 1
  host: CHANGE_ME
  image:
    repository: casinoshiz-frontend
    tag: latest
  resources:
    requests: { cpu: 25m, memory: 32Mi }
    limits: { cpu: 250m, memory: 128Mi }

services:
  identity:
    enabled: true
    autoscaling: false
    image: { repository: casinoshiz-identity, tag: latest }
    serviceName: identity
    postgresSecretKey: identity-postgres-connection-string
    redisEnabled: false
    port: 8080
    grpcPort: 8081
    public: false
  wallet:
    enabled: true
    autoscaling: false
    image: { repository: casinoshiz-wallet, tag: latest }
    serviceName: wallet
    postgresSecretKey: wallet-postgres-connection-string
    redisEnabled: false
    port: 8080
    grpcPort: 8081
    public: false
  telegram-bff:
    enabled: true
    autoscaling: true
    image: { repository: casinoshiz-telegram-bff, tag: latest }
    channel: telegram
    tokenKey: telegram-bot-token
    serviceName: telegram-bff
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: true
    port: 8080
    grpcPort: 8081
    public: true
    host: tg.example.com
  discord-bff:
    enabled: true
    autoscaling: true
    image: { repository: casinoshiz-discord-bff, tag: latest }
    serviceName: discord-bff
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: true
    port: 8080
    grpcPort: 8081
    public: false
  admin-bff:
    enabled: true
    autoscaling: false
    image: { repository: casinoshiz-admin-bff, tag: latest }
    role: admin
    adminTokenKey: admin-web-token
    serviceName: admin-bff
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: false
    port: 8080
    grpcPort: 8081
    public: true
    host: admin.example.com
  rest-api:
    enabled: true
    autoscaling: true
    image: { repository: casinoshiz-rest-api, tag: latest }
    serviceName: rest-api
    postgresSecretKey: backend-postgres-connection-string
    redisEnabled: false
    port: 8080
    grpcPort: 8081
    public: true
    host: api.example.com

backendImage:
  repository: casinoshiz-backend
  tag: latest

games:
  dice: { enabled: true }
  dicecube: { enabled: true }
  darts: { enabled: true }
  football: { enabled: true }
  basketball: { enabled: true }
  bowling: { enabled: true }
  transfer: { enabled: true }
  redeem: { enabled: true }
  leaderboard: { enabled: true }
  pixelbattle: { enabled: true }
  pick: { enabled: true }
  blackjack: { enabled: true }
  horse: { enabled: true }
  challenges: { enabled: true }
  poker: { enabled: true }
  secrethitler: { enabled: true }
  meta: { enabled: true }
  admin: { enabled: true }

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65
