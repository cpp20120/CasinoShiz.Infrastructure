global:
  domain: CHANGE_ME
  imageRegistry: ghcr.io/cpp20120

image:
  repository: casinoshiz
  tag: CHANGE_ME_IMMUTABLE_TAG

ingress:
  enabled: true
  className: traefik
  clusterIssuer: letsencrypt-production

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 65

services:
  telegram-bff:
    host: tg.CHANGE_ME
  admin-bff:
    host: admin.CHANGE_ME
  rest-api:
    host: api.CHANGE_ME
