apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: casinoshiz-local-data
  namespace: flux-system
spec:
  dependsOn:
    - name: casinoshiz-local-platform
  interval: 5m
  retryInterval: 30s
  timeout: 20m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: casinoshiz-infrastructure
  path: ./clusters/local/stages/data

  decryption:
    provider: sops
    secretRef:
      name: sops-age
