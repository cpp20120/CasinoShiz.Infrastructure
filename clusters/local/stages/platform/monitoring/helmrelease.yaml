apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: victoria-metrics-k8s-stack
      sourceRef:
        kind: HelmRepository
        name: victoria-metrics-local
        namespace: flux-system
  values:
    nameOverride: vmks
    vmsingle:
      enabled: true
      spec:
        retentionPeriod: "2d"
        storage:
          accessModes:
            - ReadWriteOnce
          storageClassName: local-path
          resources:
            requests:
              storage: 5Gi
    vmcluster:
      enabled: false
    vmagent:
      spec:
        scrapeInterval: 30s
    vmalert:
      enabled: true
    alertmanager:
      enabled: true
    grafana:
      enabled: true
      persistence:
        enabled: true
        storageClassName: local-path
        size: 2Gi
      ingress:
        enabled: false
      additionalDataSources:
        - name: Tempo
          type: tempo
          access: proxy
          url: http://tempo.observability.svc.cluster.local:3100
          isDefault: false
