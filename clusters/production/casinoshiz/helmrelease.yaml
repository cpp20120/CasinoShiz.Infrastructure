apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: casinoshiz
  namespace: casinoshiz
spec:
  interval: 10m
  chart:
    spec:
      chart: ./charts/casinoshiz
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: casinoshiz-production-values
      valuesKey: values.yaml
