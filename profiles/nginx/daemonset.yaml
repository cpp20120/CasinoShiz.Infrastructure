apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-edge
  namespace: edge
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-edge
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: nginx
          image: nginx:1.28-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              hostPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /edge-health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /edge-health
              port: http
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: "1"
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
      volumes:
        - name: config
          configMap:
            name: nginx-edge-config
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
