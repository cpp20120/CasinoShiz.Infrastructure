name: Validate infrastructure

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Helm lint
        run: helm lint charts/casinoshiz

      - name: Render application chart
        run: |
          helm template casinoshiz charts/casinoshiz             --namespace casinoshiz             -f charts/casinoshiz/values-production.yaml             > /tmp/casinoshiz.yaml

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Render production tree
        run: kustomize build clusters/production > /tmp/production.yaml
