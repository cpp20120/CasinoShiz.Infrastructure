name: Validate infrastructure

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - uses: imranismail/setup-kustomize@v2

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Validate
        run: task ci
