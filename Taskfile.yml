# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

set:
  - errexit
  - nounset
  - pipefail

vars:
  CHART: charts/casinoshiz
  NAMESPACE: casinoshiz
  PRODUCTION_VALUES: charts/casinoshiz/values-production.yaml
  RENDER_DIR: .task/rendered

tasks:
  default:
    desc: List available tasks
    cmds:
      - go-task --list

  tools:
    desc: Check required local tools
    preconditions:
      - sh: command -v helm >/dev/null
        msg: Helm is required
      - sh: command -v kustomize >/dev/null
        msg: Kustomize is required
      - sh: command -v ansible-playbook >/dev/null
        msg: Ansible is required for host checks
    cmds:
      - helm version --short
      - kustomize version
      - ansible-playbook --version | head -n 1

  lint:
    desc: Lint the CasinoShiz Helm chart
    cmds:
      - helm lint {{.CHART}} -f {{.PRODUCTION_VALUES}}

  yaml:lint:
    desc: Lint YAML files when yamllint is installed
    preconditions:
      - sh: command -v yamllint >/dev/null
        msg: Install yamllint to run YAML style validation
    cmds:
      - yamllint .

  render:chart:
    desc: Render the application Helm chart
    cmds:
      - mkdir -p {{.RENDER_DIR}}
      - >-
        helm template casinoshiz {{.CHART}}
        --namespace {{.NAMESPACE}}
        -f {{.PRODUCTION_VALUES}}
        > {{.RENDER_DIR}}/casinoshiz.yaml
    sources:
      - charts/casinoshiz/**/*
    generates:
      - "{{.RENDER_DIR}}/casinoshiz.yaml"

  render:cluster:
    desc: Render the complete production Kustomize tree
    cmds:
      - mkdir -p {{.RENDER_DIR}}
      - kustomize build clusters/production > {{.RENDER_DIR}}/production.yaml
    sources:
      - clusters/**/*
      - platform/**/*
      - data/**/*
    generates:
      - "{{.RENDER_DIR}}/production.yaml"

  ansible:check:
    desc: Validate the Ansible playbook syntax
    dir: ansible
    cmds:
      - ansible-playbook playbooks/site.yml --syntax-check

  secrets:check:
    desc: Reject obvious plaintext secrets
    cmds:
      - |
        matches="$(
          git grep -nE 'Password=[^$<{]|postgres-superuser-password: [^C]|redis-password: [^C]|minio-root-password: [^C]'             --             ':!Taskfile.yml'             ':!.github/workflows/**'             ':!*.example'             ':!docs/**'             ':!charts/casinoshiz/templates/secret-example.yaml'           || true
        )"

        if [ -n "$matches" ]; then
          printf '%s\\n' "$matches"
          echo "Potential plaintext secret found."
          exit 1
        fi

  placeholders:
    desc: Show unresolved CHANGE_ME values
    cmds:
      - git grep -n CHANGE_ME || true

  placeholders:check:
    desc: Fail when unresolved CHANGE_ME values remain
    cmds:
      - |
        matches="$(git grep -n CHANGE_ME || true)"
        if [ -n "$matches" ]; then
          printf '%s\\n' "$matches"
          echo "Unresolved CHANGE_ME values remain."
          exit 1
        fi

  validate:
    desc: Run all checks that do not require cluster access
    deps:
      - lint
      - render:chart
      - render:cluster
    cmds:
      - task: secrets:check
      - >-
        if [ -f .sops.yaml ]; then
          python scripts/infra.py sops check;
        else
          echo '.sops.yaml is not initialized; run go-task sops:init';
        fi

  release:check:
    desc: Validate a repository intended for production deployment
    cmds:
      - task: validate
      - task: placeholders:check
      - test -z "$(git status --porcelain)" || { git status --short; echo "Working tree is not clean."; exit 1; }

  preflight:
    desc: Run production preflight against the configured cluster
    cmds:
      - python scripts/infra.py cluster preflight

  post-deploy:
    desc: Verify a reconciled production cluster
    cmds:
      - python scripts/infra.py cluster post-deploy

  backup:manual:
    desc: Run all backup CronJobs immediately and wait for completion
    cmds:
      - python scripts/infra.py backup run

  restore:postgres:
    desc: Restore PostgreSQL into a separate database
    cmds:
      - python scripts/infra.py restore postgres

  restore:clickhouse:
    desc: Restore ClickHouse into a separate database
    cmds:
      - python scripts/infra.py restore clickhouse

  restore:redis:verify:
    desc: Verify the latest Redis backup in an isolated instance
    cmds:
      - python scripts/infra.py restore redis --mode verify

  restore:minio:
    desc: Restore a MinIO bucket; set MINIO_BUCKET
    preconditions:
      - sh: test -n "${MINIO_BUCKET:-}"
        msg: Set MINIO_BUCKET to the source bucket name
    cmds:
      - python scripts/infra.py restore minio --bucket "$MINIO_BUCKET"

  restore:smoke:
    desc: Run safe restore smoke tests; optionally set MINIO_BUCKET
    cmds:
      - python scripts/infra.py restore smoke


  sops:init:
    desc: Initialize age and .sops.yaml
    cmds:
      - python scripts/infra.py sops init

  sops:check:
    desc: Validate SOPS-encrypted Secret manifests
    cmds:
      - python scripts/infra.py sops check

  sops:encrypt:
    desc: Encrypt FILE in place
    requires:
      vars:
        - FILE
    cmds:
      - python scripts/infra.py sops encrypt "{{.FILE}}"

  sops:app:
    desc: Create encrypted app Secret from ENV_FILE
    requires:
      vars:
        - ENV_FILE
    cmds:
      - python scripts/infra.py sops app-secret "{{.ENV_FILE}}"

  sops:ghcr:
    desc: Create encrypted GHCR pull Secret
    cmds:
      - python scripts/infra.py sops ghcr-secret

  status:
    desc: Show production cluster status
    cmds:
      - python scripts/infra.py cluster status

  ci:
    desc: CI entrypoint
    cmds:
      - task: validate

  clean:
    desc: Remove generated manifests
    cmds:
      - rm -rf .task
